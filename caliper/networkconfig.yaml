name: CovertVote Fabric Network
version: "2.0.0"

caliper:
  blockchain: fabric

channels:
  - channelName: covertvotechannel
    contracts:
      - id: covertvote

organizations:
  - mspid: Org1MSP
    peers:
      - endpoint: localhost:7051
        tlsCACerts:
          path: '../network/crypto-config/peerOrganizations/org1.covertvote.com/peers/peer0.org1.covertvote.com/tls/ca.crt'
    identities:
      certificates:
        - name: 'Admin'
          clientPrivateKey:
            path: '../network/crypto-config/peerOrganizations/org1.covertvote.com/users/Admin@org1.covertvote.com/msp/keystore/priv_sk'
          clientSignedCert:
            path: '../network/crypto-config/peerOrganizations/org1.covertvote.com/users/Admin@org1.covertvote.com/msp/signcerts/Admin@org1.covertvote.com-cert.pem'
