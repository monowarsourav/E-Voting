test:
  name: CovertVote Scalability Benchmark
  description: Large-scale vote casting (10K to 100K) on Hyperledger Fabric
  workers:
    number: 10
  rounds:
    - label: castVote-10K
      description: Cast 10,000 votes at 200 TPS
      txNumber: 10000
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/castVote.js

    - label: castVote-25K
      description: Cast 25,000 votes at 300 TPS
      txNumber: 25000
      rateControl:
        type: fixed-rate
        opts:
          tps: 300
      workload:
        module: workload/castVote.js

    - label: castVote-50K
      description: Cast 50,000 votes at 400 TPS
      txNumber: 50000
      rateControl:
        type: fixed-rate
        opts:
          tps: 400
      workload:
        module: workload/castVote.js

    - label: castVote-100K
      description: Cast 100,000 votes at 500 TPS
      txNumber: 100000
      rateControl:
        type: fixed-rate
        opts:
          tps: 500
      workload:
        module: workload/castVote.js
