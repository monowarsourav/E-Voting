test:
  name: CovertVote Sustained-Load Benchmark
  description: All cast rounds at 200 TPS (system's comfort point) — measures realistic capacity at 10K to 100K transactions
  workers:
    number: 10
  rounds:
    - label: castVote-10K
      description: 10,000 votes at sustained 200 TPS
      txNumber: 10000
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/castVote.js

    - label: castVote-25K
      description: 25,000 votes at sustained 200 TPS
      txNumber: 25000
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/castVote.js

    - label: castVote-50K
      description: 50,000 votes at sustained 200 TPS
      txNumber: 50000
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/castVote.js

    - label: castVote-100K
      description: 100,000 votes at sustained 200 TPS
      txNumber: 100000
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/castVote.js
