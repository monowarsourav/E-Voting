# docker-compose.yml for CovertVote System

version: '3.8'

services:
  # Main API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: covertvote-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - DATABASE_PATH=/app/data/covertvote.db
      - SA2_SERVER_A_URL=http://aggregator-a:8081
      - SA2_SERVER_B_URL=http://aggregator-b:8082
      - PAILLIER_KEY_SIZE=2048
      - SMDC_SLOTS=5
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - aggregator-a
      - aggregator-b
    networks:
      - covertvote
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SA² Aggregator Server A
  aggregator-a:
    build:
      context: .
      dockerfile: Dockerfile.aggregator
    container_name: covertvote-aggregator-a
    command: ["./aggregator-a"]
    ports:
      - "8081:8081"
    environment:
      - SERVER_ID=A
      - SERVER_PORT=8081
      - SERVER_HOST=0.0.0.0
    networks:
      - covertvote
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # SA² Aggregator Server B
  aggregator-b:
    build:
      context: .
      dockerfile: Dockerfile.aggregator
    container_name: covertvote-aggregator-b
    command: ["./aggregator-b"]
    ports:
      - "8082:8082"
    environment:
      - SERVER_ID=B
      - SERVER_PORT=8082
      - SERVER_HOST=0.0.0.0
    networks:
      - covertvote
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  covertvote:
    driver: bridge

volumes:
  data:
    driver: local
  logs:
    driver: local
