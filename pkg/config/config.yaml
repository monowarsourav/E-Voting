# CovertVote Configuration

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

crypto:
  paillier_key_size: 2048  # bits
  pedersen_key_size: 1024  # bits
  ring_key_size: 1024      # bits
  smdc_slots: 5            # k=5 (1 real, 4 fake)

election:
  max_votes_per_second: 1000
  voting_period_hours: 24

blockchain:
  network: "test"
  channel_name: "covertvote-channel"
  chaincode_name: "covertvote-chaincode"
  enabled: false  # Set to true when Hyperledger Fabric is integrated

sa2:
  server_a_url: "http://localhosgit t:8081"
  server_b_url: "http://localhost:8082"
  threshold: 2  # 2-out-of-2 threshold

# Logging
logging:
  level: "info"  # debug, info, warn, error
  format: "json" # json, text
