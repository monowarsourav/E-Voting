<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CovertVote E-Voting Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .status {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .status h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.online {
            background: #10b981;
        }

        .status-indicator.offline {
            background: #ef4444;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 1em;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: 500;
            color: #374151;
        }

        .result {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.9em;
        }

        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .success {
            background: #d1fae5;
            color: #059669;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .elections-list {
            margin-top: 15px;
        }

        .election-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .election-item h4 {
            color: #1f2937;
            margin-bottom: 8px;
        }

        .election-item p {
            color: #6b7280;
            font-size: 0.9em;
            margin: 4px 0;
        }

        .candidate {
            background: white;
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 500;
        }

        .badge.active {
            background: #d1fae5;
            color: #059669;
        }

        .badge.inactive {
            background: #fee2e2;
            color: #dc2626;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗳️ CovertVote E-Voting System</h1>

        <!-- Backend Status -->
        <div class="status">
            <h3>Backend Services Status</h3>
            <div id="api-status">
                <span class="status-indicator offline"></span>
                <span>API Server: Checking...</span>
            </div>
            <div id="aggregator-a-status">
                <span class="status-indicator offline"></span>
                <span>SA² Server A: Checking...</span>
            </div>
            <div id="aggregator-b-status">
                <span class="status-indicator offline"></span>
                <span>SA² Server B: Checking...</span>
            </div>
        </div>

        <div class="grid">
            <!-- Get Elections -->
            <div class="card">
                <h2>📋 View Elections</h2>
                <button onclick="getElections()">Get All Elections</button>
                <div id="elections-result" class="result" style="display:none;"></div>
            </div>

            <!-- Register Voter -->
            <div class="card">
                <h2>✍️ Register Voter</h2>
                <label>Voter ID (NID):</label>
                <input type="text" id="voter-id" placeholder="NID12345" value="NID12345">
                <button onclick="registerVoter()">Register</button>
                <div id="register-result" class="result" style="display:none;"></div>
            </div>

            <!-- Cast Vote -->
            <div class="card">
                <h2>🗳️ Cast Vote</h2>
                <label>Your Voter ID:</label>
                <input type="text" id="vote-voter-id" placeholder="From registration">
                <label>Election ID:</label>
                <input type="text" id="election-id" placeholder="election001" value="election001">
                <label>Candidate ID:</label>
                <select id="candidate-id">
                    <option value="1">Candidate 1</option>
                    <option value="2">Candidate 2</option>
                </select>
                <button onclick="castVote()">Cast Vote</button>
                <div id="vote-result" class="result" style="display:none;"></div>
            </div>

            <!-- Get Results -->
            <div class="card">
                <h2>📊 View Results</h2>
                <label>Election ID:</label>
                <input type="text" id="result-election-id" placeholder="election001" value="election001">
                <button onclick="getResults()">Get Results</button>
                <div id="results-result" class="result" style="display:none;"></div>
            </div>

            <!-- Admin: Create Election -->
            <div class="card">
                <h2>🔐 Admin: Create Election</h2>
                <label>Admin Token:</label>
                <input type="password" id="admin-token" placeholder="From .env file">
                <label>Election Title:</label>
                <input type="text" id="election-title" placeholder="New Election">
                <button onclick="createElection()">Create Election</button>
                <div id="admin-result" class="result" style="display:none;"></div>
            </div>

            <!-- Admin: Tally Votes -->
            <div class="card">
                <h2>🔐 Admin: Tally Votes</h2>
                <label>Admin Token:</label>
                <input type="password" id="tally-admin-token" placeholder="From .env file">
                <label>Election ID:</label>
                <input type="text" id="tally-election-id" placeholder="election001" value="election001">
                <button onclick="tallyVotes()">Tally Votes</button>
                <div id="tally-result" class="result" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080';
        const API_V1 = `${API_BASE_URL}/api/v1`;
        const AGGREGATOR_A = 'http://localhost:8081';
        const AGGREGATOR_B = 'http://localhost:8082';

        // Check backend status on load
        window.addEventListener('load', () => {
            checkBackendStatus();
        });

        async function checkBackendStatus() {
            // Check API server
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (response.ok) {
                    updateStatus('api-status', true, 'API Server: Online');
                } else {
                    updateStatus('api-status', false, 'API Server: Offline');
                }
            } catch (error) {
                updateStatus('api-status', false, 'API Server: Offline');
            }

            // Check Aggregator A
            try {
                const response = await fetch(`${AGGREGATOR_A}/health`);
                if (response.ok) {
                    updateStatus('aggregator-a-status', true, 'SA² Server A: Online');
                } else {
                    updateStatus('aggregator-a-status', false, 'SA² Server A: Offline');
                }
            } catch (error) {
                updateStatus('aggregator-a-status', false, 'SA² Server A: Offline');
            }

            // Check Aggregator B
            try {
                const response = await fetch(`${AGGREGATOR_B}/health`);
                if (response.ok) {
                    updateStatus('aggregator-b-status', true, 'SA² Server B: Online');
                } else {
                    updateStatus('aggregator-b-status', false, 'SA² Server B: Offline');
                }
            } catch (error) {
                updateStatus('aggregator-b-status', false, 'SA² Server B: Offline');
            }
        }

        function updateStatus(elementId, isOnline, text) {
            const element = document.getElementById(elementId);
            const indicator = element.querySelector('.status-indicator');
            const span = element.querySelector('span:last-child');

            if (isOnline) {
                indicator.classList.remove('offline');
                indicator.classList.add('online');
            } else {
                indicator.classList.remove('online');
                indicator.classList.add('offline');
            }
            span.textContent = text;
        }

        function showResult(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            element.className = isError ? 'result error' : 'result success';
        }

        async function getElections() {
            try {
                const response = await fetch(`${API_V1}/elections`);
                const data = await response.json();

                if (!response.ok) {
                    showResult('elections-result', data, true);
                    return;
                }

                // Pretty display
                const electionsDiv = document.getElementById('elections-result');
                electionsDiv.style.display = 'block';
                electionsDiv.className = 'result';
                electionsDiv.innerHTML = '<div class="elections-list"></div>';

                const list = electionsDiv.querySelector('.elections-list');
                data.elections.forEach(election => {
                    const item = document.createElement('div');
                    item.className = 'election-item';
                    item.innerHTML = `
                        <h4>${election.title}</h4>
                        <p><strong>ID:</strong> ${election.election_id}</p>
                        <p><strong>Description:</strong> ${election.description || 'N/A'}</p>
                        <p><strong>Status:</strong> <span class="badge ${election.is_active ? 'active' : 'inactive'}">${election.is_active ? 'Active' : 'Inactive'}</span></p>
                        <p><strong>Total Votes:</strong> ${election.total_votes}</p>
                        <p><strong>Candidates:</strong></p>
                        ${election.candidates.map(c => `
                            <div class="candidate">
                                <span><strong>${c.id}.</strong> ${c.name}</span>
                                <span style="color: #6b7280;">${c.party}</span>
                            </div>
                        `).join('')}
                    `;
                    list.appendChild(item);
                });
            } catch (error) {
                showResult('elections-result', { error: error.message }, true);
            }
        }

        async function registerVoter() {
            const voterId = document.getElementById('voter-id').value;

            if (!voterId) {
                showResult('register-result', { error: 'Please enter a voter ID' }, true);
                return;
            }

            // Generate dummy biometric data (in production, this comes from real hardware)
            const fingerprintData = btoa(String.fromCharCode(...new Uint8Array(200).map(() => Math.random() * 256)));
            const livenessData = btoa(String.fromCharCode(...new Uint8Array(200).map(() => Math.random() * 256)));

            try {
                const response = await fetch(`${API_V1}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', // Important: Store session cookie
                    body: JSON.stringify({
                        voter_id: voterId,
                        fingerprint_data: fingerprintData,
                        liveness_data: livenessData,
                        biographic_data: 'Demo user',
                        eligibility_proof: 'Demo proof'
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showResult('register-result', data, true);
                    return;
                }

                // Auto-fill vote voter ID
                document.getElementById('vote-voter-id').value = data.voter_id;
                showResult('register-result', data, false);
            } catch (error) {
                showResult('register-result', { error: error.message }, true);
            }
        }

        async function castVote() {
            const voterId = document.getElementById('vote-voter-id').value;
            const electionId = document.getElementById('election-id').value;
            const candidateId = parseInt(document.getElementById('candidate-id').value);

            if (!voterId || !electionId) {
                showResult('vote-result', { error: 'Please fill all fields' }, true);
                return;
            }

            // Get session token from cookie
            const sessionToken = getCookie('session_token');

            try {
                const response = await fetch(`${API_V1}/vote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', // Important: Send session cookie
                    body: JSON.stringify({
                        voter_id: voterId,
                        election_id: electionId,
                        candidate_id: candidateId,
                        smdc_slot_index: 0, // Use real slot (not fake)
                        auth_token: sessionToken || 'session_token'
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showResult('vote-result', data, true);
                    return;
                }

                showResult('vote-result', data, false);
            } catch (error) {
                showResult('vote-result', { error: error.message }, true);
            }
        }

        async function getResults() {
            const electionId = document.getElementById('result-election-id').value;

            if (!electionId) {
                showResult('results-result', { error: 'Please enter an election ID' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_V1}/results/${electionId}`);
                const data = await response.json();

                if (!response.ok) {
                    showResult('results-result', data, true);
                    return;
                }

                showResult('results-result', data, false);
            } catch (error) {
                showResult('results-result', { error: error.message }, true);
            }
        }

        async function createElection() {
            const adminToken = document.getElementById('admin-token').value;
            const title = document.getElementById('election-title').value;

            if (!adminToken || !title) {
                showResult('admin-result', { error: 'Please fill all fields' }, true);
                return;
            }

            const now = Math.floor(Date.now() / 1000);
            const endTime = now + (24 * 60 * 60); // 24 hours from now

            try {
                const response = await fetch(`${API_V1}/admin/elections`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        description: 'Created via demo',
                        candidates: [
                            { id: 1, name: 'Candidate A', description: 'First candidate', party: 'Party 1' },
                            { id: 2, name: 'Candidate B', description: 'Second candidate', party: 'Party 2' }
                        ],
                        start_time: now,
                        end_time: endTime,
                        admin_token: adminToken
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showResult('admin-result', data, true);
                    return;
                }

                showResult('admin-result', data, false);
                // Refresh elections list
                getElections();
            } catch (error) {
                showResult('admin-result', { error: error.message }, true);
            }
        }

        async function tallyVotes() {
            const adminToken = document.getElementById('tally-admin-token').value;
            const electionId = document.getElementById('tally-election-id').value;

            if (!adminToken || !electionId) {
                showResult('tally-result', { error: 'Please fill all fields' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_V1}/admin/tally`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        election_id: electionId,
                        admin_token: adminToken
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showResult('tally-result', data, true);
                    return;
                }

                showResult('tally-result', data, false);
            } catch (error) {
                showResult('tally-result', { error: error.message }, true);
            }
        }

        // Helper function to get cookie value
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }
    </script>
</body>
</html>
